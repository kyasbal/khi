name: Deploy Prebuilt Branch

on:
  push:
    branches:
      - 'main'
      - 'feat/go-get'

jobs:
  deploy-prebuilt-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: './.node-version'

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm ci

      - name: Generate frontend codes
        run: make generate-frontend

      - name: Build Web
        run: make build-web

      - name: Generate Backend Codes
        run: make generate-backend

      - name: Deploy to main-prebuilt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add -f pkg/server/dist/browser pkg/generated '**/zzz_*.go'
          git commit -m "chore: deploy prebuilt frontend assets from ${GITHUB_SHA}" || echo "No changes to commit"
          git push origin HEAD:main-prebuilt --force
