name: Release Draft

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0 or v1.0.0-beta-1)'
        required: true
        type: string

jobs:
  release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: './.node-version'

      - name: Install Frontend Dependencies
        run: |
          cd web
          npm ci

      - name: Update VERSION file
        run: echo "${{ inputs.version }}" | sed 's/^v//' > VERSION

      - name: Build Web
        run: make build-web

      - name: Generate Backend Codes
        run: make generate-backend

      - name: Tag and Push Release Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add -f pkg/server/dist/browser pkg/generated '**/zzz_*.go'
          git commit -m "chore: release ${{ inputs.version }}"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Build Binaries
        run: make build-go-binaries

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ inputs.version }}
          draft: true
          files: bin/*
