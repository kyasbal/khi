<div class="log-body-view-root">
  @let l = log();
  @if (l) {
    <khi-log-header [log]="l"></khi-log-header>
    <div class="toolbar">
      <button
        class="toolbar-button"
        matIconButton
        matTooltip="Copy the log to clipboard"
        (click)="copyLog()"
      >
        <mat-icon>content_paste</mat-icon>
      </button>
      @if (showCopyQueryButton()) {
        <button
          class="toolbar-button"
          matIconButton
          matTooltip="Copy query to clipboard"
          (click)="copyLogQuery()"
        >
          <mat-icon>markdown_paste</mat-icon>
        </button>
      }
    </div>
    <div class="log-body-container-scrollable">
      <pre
        class="log-body-container"
      ><code [highlight]="(l.body | resolveText | async) ??''" language="yaml" lineNumbers></code></pre>
    </div>
  } @else {
    <div class="empty-message">
      <mat-icon>error</mat-icon>
      <p>No log selected</p>
    </div>
  }
</div>
