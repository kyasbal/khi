<div class="log-list-wrapper">
  <div class="log-toolbar">
    <div class="timeline-filter-wrapper">
      <khi-icon-toggle-button
        icon="filter_alt"
        tooltip="Filter with selected resource timeline"
        [(selected)]="filterByTimeline"
        [disabled]="false"
      >
      </khi-icon-toggle-button>
    </div>
    <div class="timeline-filter-children-wrapper">
      <khi-icon-toggle-button
        icon="sort"
        tooltip="Includes children of the selected resource timeline"
        [(selected)]="includeTimelineChildren"
        [disabled]="filterByTimeline() === false"
      ></khi-icon-toggle-button>
    </div>
    <p class="spacer">{{ shownLogsCount() }}/{{ allLogsCount() }} logs</p>
  </div>
  <div class="log-list-container" tabindex="0">
    <cdk-virtual-scroll-viewport class="virtual-viewport">
      <div class="log-list">
        <ng-container *cdkVirtualFor="let log of shownLogs()">
          <khi-log-view-log-line
            [log]="log"
            [selected]="selectedLogIndex() === log.logIndex"
            [highlighted]="highlightLogIndices().has(log.logIndex)"
            (lineClick)="selectLog($event)"
            (lineHover)="onLogHover($event)"
          ></khi-log-view-log-line>
        </ng-container>
      </div>
    </cdk-virtual-scroll-viewport>
  </div>
</div>
